<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <style>
      .bolt { 
        stroke-linejoin: round; 
      }
      .text-title { 
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif; 
        font-weight: 900; 
        font-size: 42px; 
        fill: #737878; /* Neutral */
        letter-spacing: 8px; 
      }
      .text-sub { 
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif; 
        font-weight: 700; 
        font-size: 13px; 
        fill: #5A7D7D; /* Secondary */
        letter-spacing: 4px; 
      }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" rx="30" />

  <g transform="translate(-14, 10)">
    
    <path d="M 150 190 A 55 55 0 0 0 260 190" fill="none" stroke="#5A7D7D" stroke-width="36" stroke-linecap="round"/>

    <line x1="260" y1="190" x2="260" y2="120" stroke="#ffffff" stroke-width="48" stroke-linecap="round"/>
    <line x1="260" y1="190" x2="260" y2="120" stroke="#008889" stroke-width="36" stroke-linecap="round"/>

    <polygon points="283,40 238,130 268,130 245,175 290,85 260,85" fill="#ffffff" stroke="#ffffff" stroke-width="12" class="bolt"/>
    
    <polygon points="283,40 238,130 268,130 245,175 290,85 260,85" fill="#9966CC" stroke="#9966CC" stroke-width="2" class="bolt"/>
  </g>

  <text x="204" y="330" text-anchor="middle" class="text-title">JUGAAD</text>
  <text x="202" y="360" text-anchor="middle" class="text-sub">SHORTCUT SOLUTION</text>
  
</svg>
